version: "2"
linters:
  default: none
  enable:
    - lll
    - nolintlint
    - staticcheck
  settings:
    lll:
      line-length: 100
    nolintlint:
      allow-unused: false
      require-explanation: true
    staticcheck:
      checks:
        - "SA1019"
  exclusions:
    rules:
      - linters:
          - lll
        source: '^//go:generate |https?://'
      - linters:
          - lll
        path: _test\.go
run:
  timeout: 10m
