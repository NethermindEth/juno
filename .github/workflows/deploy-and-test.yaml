name: Deploy and Test

on:
  workflow_call:
    inputs:
      docker_image_tag:
        required: true
        type: string
        description: "The Docker image tag to deploy"
      environment:
        required: true
        type: string
        description: "The environment to deploy to (Development or Staging)"
      source_repo:
        required: true
        type: string
        description: "Source repository for the image"
      target_repo:
        required: true
        type: string
        description: "Target repository for the image"
      test_mode:
        required: false
        type: string
        default: "full"
        description: "Test mode to run (fast or full)"
    secrets:
      RPC_URL:
        required: true
      WS_RPC_URL:
        required: true
      TEST_ACCOUNT_ADDRESS:
        required: true
      TEST_ACCOUNT_PRIVATE_KEY:
        required: true
      TEST_ACCOUNT_ADDRESS_2:
        required: true
      TEST_ACCOUNT_PRIVATE_KEY_2:
        required: true
      TEST_ACCOUNT_ADDRESS_3:
        required: true
      TEST_ACCOUNT_PRIVATE_KEY_3:
        required: true
      TEST_ACCOUNT_PUBLIC_KEY_3:
        required: true
      AUTH_TOKEN:
        required: true

concurrency:
  group: shared_${{ inputs.environment }}_environment
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  DOCKER_REGISTRY: nethermind.jfrog.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v.4.0.0
        id: buildx

      - name: Install JFrog CLI
        id: jfrog
        uses: jfrog/setup-jfrog-cli@1641575d87647fb969c0545f0b6a76873e328b7c # v5.0.0
        env:
          JF_URL: https://${{ env.DOCKER_REGISTRY }}
        with:
          oidc-provider-name: github-nethermindeth

      - name: Login to Registry with OIDC
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ steps.jfrog.outputs.oidc-user }}
          password: ${{ steps.jfrog.outputs.oidc-token }}

      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3

      - name: Check image exists in source repository
        run: |
          oras manifest fetch \
          ${{ env.DOCKER_REGISTRY }}/${{ inputs.source_repo }}/juno:${{ inputs.docker_image_tag }} || \
          (echo "❌ Image not found in source repository!" && exit 1)

      - name: Deploy image
        run: |
          SOURCE_TAG=${{ env.DOCKER_REGISTRY }}/${{ inputs.source_repo }}/juno:${{ inputs.docker_image_tag }}
          TARGET_TAG=${{ env.DOCKER_REGISTRY }}/${{ inputs.target_repo }}/juno:${{ inputs.docker_image_tag }}

          if [ "${{ inputs.source_repo }}" = "${{ inputs.target_repo }}" ]; then
            echo "Source and target repositories are the same, pushing as latest"
            docker buildx imagetools create -t ${{ env.DOCKER_REGISTRY }}/${{ inputs.target_repo }}/juno:latest $SOURCE_TAG
          else
            echo "Copying image from source to target repository"
            oras cp -r $SOURCE_TAG $TARGET_TAG,latest
          fi

      - name: Verify Deployment Version
        run: |
          bash .github/workflow-scripts/verify_deployment.sh ${{ secrets.RPC_URL }} ${{ secrets.AUTH_TOKEN }} ${{ inputs.docker_image_tag }}

  starknet-rs-rpcv08:
    needs: [deploy]
    uses: ./.github/workflows/starknet-rs-tests.yml
    with:
      ref: starknet/v0.15.0
    secrets:
      STARKNET_RPC: ${{ secrets.RPC_URL }}/v0_8?apikey=${{ secrets.AUTH_TOKEN }}

  starknet-rs-rpcv09:
    needs: [deploy, starknet-rs-rpcv08]
    uses: ./.github/workflows/starknet-rs-tests.yml
    with:
      ref: starknet/v0.17.0
    secrets:
      STARKNET_RPC: ${{ secrets.RPC_URL }}/v0_9?apikey=${{ secrets.AUTH_TOKEN }}

  starknet-rust-rpcv10:
    needs: [deploy, starknet-rs-rpcv09]
    uses: ./.github/workflows/starknet-rust-tests.yml
    with:
      # Latest master commit. Switch to 0.19.0 once released
      ref: e437eb33dc44a2c448decd1a7127d69594e08cb8
    secrets:
      STARKNET_RPC: ${{ secrets.RPC_URL }}/v0_10?apikey=${{ secrets.AUTH_TOKEN }}

  starknet-js-rpcv08:
    needs: [deploy]
    uses: ./.github/workflows/starknet-js-tests.yml
    with:
      ref: v8.0.0
      rpc_version: v0_8
      test_mode: ${{ inputs.test_mode }}
    secrets:
      TEST_RPC_URL: ${{ secrets.RPC_URL }}/v0_8?apikey=${{ secrets.AUTH_TOKEN }}
      TEST_WS_URL: ${{ secrets.WS_RPC_URL }}/v0_8?apikey=${{ secrets.AUTH_TOKEN }}
      TEST_ACCOUNT_ADDRESS: ${{ secrets.TEST_ACCOUNT_ADDRESS }}
      TEST_ACCOUNT_PRIVATE_KEY: ${{ secrets.TEST_ACCOUNT_PRIVATE_KEY }}

  starknet-js-rpcv09:
    needs: [deploy]
    uses: ./.github/workflows/starknet-js-tests.yml
    with:
      ref: v9.4.2
      rpc_version: v0_9
      test_mode: ${{ inputs.test_mode }}
    secrets:
      TEST_RPC_URL: ${{ secrets.RPC_URL }}/v0_9?apikey=${{ secrets.AUTH_TOKEN }}
      TEST_WS_URL: ${{ secrets.WS_RPC_URL }}/v0_9?apikey=${{ secrets.AUTH_TOKEN }}
      TEST_ACCOUNT_ADDRESS: ${{ secrets.TEST_ACCOUNT_ADDRESS_2 }}
      TEST_ACCOUNT_PRIVATE_KEY: ${{ secrets.TEST_ACCOUNT_PRIVATE_KEY_2 }}

  starknet-js-rpcv10:
    needs: [deploy]
    uses: ./.github/workflows/starknet-js-tests.yml
    with:
      ref: v9.4.2
      rpc_version: v0_10
      test_mode: ${{ inputs.test_mode }}
    secrets:
      TEST_RPC_URL: ${{ secrets.RPC_URL }}/v0_10?apikey=${{ secrets.AUTH_TOKEN }}
      TEST_WS_URL: ${{ secrets.WS_RPC_URL }}/v0_10?apikey=${{ secrets.AUTH_TOKEN }}
      TEST_ACCOUNT_ADDRESS: ${{ secrets.TEST_ACCOUNT_ADDRESS_3 }}
      TEST_ACCOUNT_PRIVATE_KEY: ${{ secrets.TEST_ACCOUNT_PRIVATE_KEY_3 }}

  starknet-go-rpcv08:
    needs: [deploy]
    uses: ./.github/workflows/starknet-go-tests.yml
    with:
      ref: rpcv08-juno-ci
      rpc_version: v0_8
    secrets:
      TEST_RPC_URL: ${{ secrets.RPC_URL }}
      TEST_WS_RPC_URL: ${{ secrets.WS_RPC_URL }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}

  starknet-go-rpcv09:
    needs: [deploy]
    uses: ./.github/workflows/starknet-go-tests.yml
    with:
      ref: rpcv09-juno-ci
      rpc_version: v0_9
    secrets:
      TEST_RPC_URL: ${{ secrets.RPC_URL }}
      TEST_WS_RPC_URL: ${{ secrets.WS_RPC_URL }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      STARKNET_PRIVATE_KEY: ${{ secrets.TEST_ACCOUNT_PRIVATE_KEY_3 }}
      STARKNET_PUBLIC_KEY: ${{ secrets.TEST_ACCOUNT_PUBLIC_KEY_3 }}
      STARKNET_ACCOUNT_ADDRESS: ${{ secrets.TEST_ACCOUNT_ADDRESS_3 }}

  golden-tests:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout golden tests
        uses: actions/checkout@v6.0.2
        with:
          repository: NethermindEth/starknet-golden-tests

      - name: Run golden tests
        env:
          STARKNET_RPC: ${{ secrets.RPC_URL }}/v0_9?apikey=${{ secrets.AUTH_TOKEN }}
        run: ./golden.sh test
