name: starknet-js tests

on:
  workflow_call:
    inputs:
      test_mode:
        type: string
        default: "full"
        description: "Test mode to run (fast or full)"
      ref:
        type: string
        description: "starknet.js version/tag to test"
      rpc_version:
        type: string
        default: "v0_9"
        description: "RPC version being tested (v0_8, v0_9, or v0_10)"
    secrets:
      TEST_RPC_URL:
        required: false
      TEST_WS_URL:
        required: false
      TEST_ACCOUNT_ADDRESS:
        required: false
      TEST_ACCOUNT_PRIVATE_KEY:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6.0.2
        with:
          repository: starknet-io/starknet.js
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Set test configuration
        id: tests
        run: |
          # rpcChannel test file differs by version: v0.10 uses rpcChannel010, older versions use rpcChannel
          if [ "${{ inputs.rpc_version }}" == "v0_10" ]; then
            RPC_CHANNEL_TEST="rpcChannel010.test.ts"
          else
            RPC_CHANNEL_TEST="rpcChannel.test.ts"
          fi

          FAST_TESTS="rpcProvider.test.ts transactionReceipt.test.ts ${RPC_CHANNEL_TEST} defaultProvider.test.ts"

          if [ "${{ inputs.test_mode }}" == "fast" ]; then
            echo "tests=${FAST_TESTS}" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.rpc_version }}" == "v0_10" ]; then
            # cairo1.test.ts was removed in starknet.js v9.x
            echo "tests=${FAST_TESTS} contract.test.ts cairo1v2.test.ts cairo1v2_typed.test.ts account.test.ts account.starknetId.test.ts" >> $GITHUB_OUTPUT
          else
            echo "tests=${FAST_TESTS} contract.test.ts cairo1v2.test.ts cairo1v2_typed.test.ts cairo1.test.ts account.test.ts account.starknetId.test.ts" >> $GITHUB_OUTPUT
          fi

      - name: Run tests (${{ inputs.test_mode }} mode)
        # "waitForBlock pending" is ignored because starknet.js waits till current block number to equal target pending block number,
        # but retry interval is 5s second and next time current block number is updated, it is ahead of target block due to shorter block times.
        # This leads the test to fail with time-out
        run: npm test -- ${{ steps.tests.outputs.tests }} --testNamePattern="^(?!.*(getSyncingStats|traceTransaction|waitForBlock pending)).*$"
        env:
          TEST_RPC_URL: ${{ secrets.TEST_RPC_URL }}
          TEST_WS_URL: ${{ secrets.TEST_WS_URL }}
          TEST_ACCOUNT_ADDRESS: ${{ secrets.TEST_ACCOUNT_ADDRESS }}
          TEST_ACCOUNT_PRIVATE_KEY: ${{ secrets.TEST_ACCOUNT_PRIVATE_KEY }}
          TX_VERSION: 0x3
