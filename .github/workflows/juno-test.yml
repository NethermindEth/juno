name: Juno Test
on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-arm64-4-core]
        juno_new_state: [false, true]
    runs-on: ${{ matrix.os }}
    name: Run Tests${{ matrix.juno_new_state && ' [New State]' || '' }}
    env:
      VM_DEBUG: true
      JUNO_NEW_STATE: ${{ matrix.juno_new_state }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version-file: go.mod
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.94.1"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          key: rust-toolchain-${{ matrix.os }}
          workspaces: |
            vm/rust
            starknet/compiler/rust

      - name: Install deps
        run: make install-deps

      - name: Install Jemalloc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libjemalloc-dev libjemalloc2 libbz2-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jemalloc

      - name: Tests (Coverage)
        if: matrix.os == 'ubuntu-latest'
        run: make test-cover

      - name: Tests (No Coverage)
        if: matrix.os != 'ubuntu-latest'
        run: make test

      #    Tests with race condition detector are flaky; we're disabling them for now
      #      - name: Tests (Race Detection)
      #        if: matrix.os == 'ubuntu-latest'
      #        run: make test-race

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: coverage/coverage.old.out,coverage/coverage.new.out
          flags: ${{ matrix.juno_new_state && 'new-state' || 'old-state' }}
