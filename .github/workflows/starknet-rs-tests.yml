name: starknet-rs tests

on:
  workflow_call:
    inputs:
      ref:
        type: string
        default: 'starknet/v0.15.0'
        description: 'starknet-rs version/tag to test'
    secrets:
      STARKNET_RPC:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: xJonathanLEI/starknet-rs
          ref: ${{ inputs.ref }}

      - name: Setup Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run jsonrpc tests
        run: |
          cd starknet-providers && cargo test jsonrpc -- --skip jsonrpc_get_block_with_receipts
          cd ../starknet-accounts
          # TODO: Once SDK is updated, remove ignore for declare tests
          cargo test jsonrpc -- \
            --skip can_declare_cairo0_contract_with_jsonrpc \
            --skip can_estimate_declare_v3_fee_with_jsonrpc \
            --skip can_declare_cairo1_contract_v3_with_jsonrpc
        env:
          STARKNET_RPC: ${{ secrets.STARKNET_RPC }}
          RUST_BACKTRACE: full
