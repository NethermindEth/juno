name: CI/CD

on:
  push:
    branches: [main,wojciechos/local_artifactory]
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  prepare_dummy_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Define docker image tag
        id: image_tag
        run: |
          echo "DOCKER_IMAGE_TAG=testing-tag" >> $GITHUB_ENV
          echo "IMAGE_TAG=testing-tag" >> "$GITHUB_OUTPUT"
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build dummy Docker image
        run: |
          echo -e "FROM busybox\nCMD echo 'This is a dummy image'" > Dockerfile
          docker build -t juno:${{ env.DOCKER_IMAGE_TAG }} .
          docker save -o /tmp/juno_image.tar juno:${{ env.DOCKER_IMAGE_TAG }}
      
      - name: Upload dummy Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: juno_image.tar
          path: /tmp/juno_image.tar

  docker_build_and_publish:
    runs-on: ubuntu-latest
    needs: prepare_dummy_image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define docker image tag
        id: image_tag
        run: |
          echo "DOCKER_IMAGE_TAG=$(git describe --tags)" >> $GITHUB_ENV
          echo "IMAGE_TAG=$(git describe --tags)" >> "$GITHUB_OUTPUT"

      - name: Download dummy Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: juno_image.tar
          path: /tmp

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.59.0
        env:
          JF_URL: ${{ vars.JFROG_URL }}
          ARTIFACTORY_URL: ${{vars.ARTIFACTORY_URL}}
          JF_ACCESS_TOKEN: ${{ secrets.ARTIFACTORY_ANGKOR_CONTRIBUTOR }}

      - name: Login to Artifactory Docker registry
        run: |
          jfrog docker login

      - name: Load dummy Docker image
        run: docker load -i /tmp/juno_image.tar
      
      - name: Tag Docker image
        run: |
          jfrog docker tag juno:testing-tag nethermind.jfrog.io/angkor-docker-virtual-dev:v0.0.0

      - name: Upload Docker image to dev artifactory
        run: |
          jfrog docker push nethermind.jfrog.io/angkor-docker-virtual-dev:v0.0.0

  validate_dev:
    needs: [docker_build_and_publish]
    runs-on: ubuntu-latest
    environment: 
      name: Development
    steps:
      - name: Verify Deployment Version (Dev)
        run: bash .github/workflow-scripts/verify_deployment.sh ${{ secrets.DEV_SEPOLIA_URL }} ${{ needs.docker_build_and_publish.outputs.IMAGE_TAG }}        
        
  dev-starknet-rs-tests:
    needs: [validate_dev]
    uses: ./.github/workflows/starknet-rs-tests.yml
    secrets:
      STARKNET_RPC: ${{ secrets.DEV_SEPOLIA_URL }}/v0_6
      
  dev-starknet-js-tests:
    needs: [validate_dev]
    uses: ./.github/workflows/starknet-js-tests.yml
    secrets:
      TEST_RPC_URL: ${{ secrets.DEV_SEPOLIA_URL }}/v0_7
      TEST_ACCOUNT_ADDRESS: ${{ secrets.TEST_ACCOUNT_ADDRESS }}
      TEST_ACCOUNT_PRIVATE_KEY: ${{ secrets.TEST_ACCOUNT_PRIVATE_KEY }}
  
  promote_to_staging:
    needs: [docker_build_and_publish, validate_dev]
    runs-on: ubuntu-latest
    environment: 
      name: Staging
    steps:         
    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: ${{ vars.JFROG_URL}}
        JF_ACCESS_TOKEN: ${{ secrets.ARTIFACTORY_ANGKOR_CONTRIBUTOR }}

    - name: Copy image to staging artifactory
      run: |
        jfrog rt cp "angkor-docker-local-dev/juno:${{ env.DOCKER_IMAGE_TAG }}" "angkor-docker-local-staging/juno:${{ env.DOCKER_IMAGE_TAG }}"
    
    - name: Verify Deployment Version (Staging)
      run: bash .github/workflow-scripts/verify_deployment.sh ${{ secrets.STAGING_SEPOLIA_URL }} ${{ needs.docker_build_and_publish.outputs.IMAGE_TAG }}

  staging-starknet-rs-tests:
    needs: [promote_to_staging]
    uses: ./.github/workflows/starknet-rs-tests.yml
    secrets:
      STARKNET_RPC: ${{ secrets.STAGING_SEPOLIA_URL }}/v0_6

  staging-starknet-js-tests:
    needs: [promote_to_staging]
    uses: ./.github/workflows/starknet-js-tests.yml
    secrets:
      TEST_RPC_URL: ${{ secrets.STAGING_SEPOLIA_URL }}/v0_7
      TEST_ACCOUNT_ADDRESS: ${{ secrets.TEST_ACCOUNT_ADDRESS }}
      TEST_ACCOUNT_PRIVATE_KEY: ${{ secrets.TEST_ACCOUNT_PRIVATE_KEY }}
  
  promote_to_prod:
    needs: [docker_build_and_publish, promote_to_staging]
    runs-on: ubuntu-latest
    environment: 
      name: Prod
    steps:         
    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: ${{ vars.JFROG_URL}}
        JF_ACCESS_TOKEN: ${{ secrets.ARTIFACTORY_ANGKOR_CONTRIBUTOR }}

    - name: Copy image to staging artifactory
      run: |
        jfrog rt cp "angkor-docker-local-staging/juno:${{ env.DOCKER_IMAGE_TAG }}" "angkor-docker-local-prod/juno:${{ env.DOCKER_IMAGE_TAG }}"
    
    - name: Verify Deployment Version (Staging)
      run: bash .github/workflow-scripts/verify_deployment.sh ${{ secrets.STAGING_SEPOLIA_URL }} ${{ needs.docker_build_and_publish.outputs.IMAGE_TAG }}