name: JSON Benchmark

on:
  push:
  workflow_dispatch:
    inputs:
      repeats:
        description: "Number of benchmark repeats per test case"
        required: false
        default: "1"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: JSON Benchmark (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-arm64-4-core]
    runs-on: ${{ matrix.os }}
    env:
      GOLDEN_TESTS_DIR: ${{ github.workspace }}/starknet-golden-tests
      BENCH_REPEAT: ${{ inputs.repeats || '1' }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Checkout golden tests
        uses: actions/checkout@v6.0.2
        with:
          repository: NethermindEth/starknet-golden-tests
          path: starknet-golden-tests
          ref: add/v10-tests

      - name: Verify golden tests
        run: ls $GOLDEN_TESTS_DIR/tests/sepolia/v0.10/

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: rust-toolchain-${{ matrix.os }}
          workspaces: |
            vm/rust
            core/rust
            starknet/compiler/rust

      - name: Install deps
        run: make install-deps

      - name: Install Jemalloc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libjemalloc-dev libjemalloc2 libbz2-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jemalloc

      - name: Build Rust dependencies
        run: make rustdeps

      - name: Set CGO_LDFLAGS (Linux)
        if: runner.os == 'Linux'
        run: echo "CGO_LDFLAGS=-ldl -lm" >> $GITHUB_ENV

      - name: Set CGO_LDFLAGS (macOS)
        if: runner.os == 'macOS'
        run: echo "CGO_LDFLAGS=-framework Foundation -framework SystemConfiguration" >> $GITHUB_ENV

      - name: Run JSON benchmark
        run: |
          go test -v -run=TestSummary -count=1 -timeout=120m \
            ./cmd/jsonbench/ 2>&1 | tee benchmark-summary.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-benchmark-${{ matrix.os }}
          path: benchmark-summary.txt
